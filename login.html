<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Login | ReviewProduct</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* UI REFINED: lebih clean, lebih kecil, lebih modern */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 28px;
            padding: 1.75rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .login-card:hover {
            box-shadow: 0 24px 40px -14px rgba(0, 0, 0, 0.12);
        }

        /* Logo lebih kecil & refined */
        .logo-box {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem auto;
            font-size: 1.6rem;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.1);
        }

        /* Typography lebih proporsional & clean */
        .login-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0a0e1a;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            font-size: 0.8rem;
            color: #6c6f7e;
            font-weight: 400;
        }

        /* Label lebih kecil, modern, uppercase ringan */
        .form-label-clean {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #5a5e70;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        /* Input fields: padding lebih ramping, font lebih kecil, border refined */
        .input-clean {
            border-radius: 14px;
            padding: 0.65rem 1rem;
            font-size: 0.85rem;
            font-weight: 450;
            border: 1.5px solid #e9edf2;
            background-color: #ffffff;
            transition: all 0.2s ease;
            color: #1a1e2c;
        }

        .input-clean:focus {
            border-color: #0f172a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
        }

        /* Tombol login lebih ramping, modern */
        .btn-login-clean {
            background: #0f172a;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login-clean:hover {
            background: #1e293b;
            transform: translateY(-1px);
        }

        .btn-login-clean:active {
            transform: translateY(1px);
        }

        /* Link daftar lebih clean */
        .register-link-clean {
            font-size: 0.75rem;
            font-weight: 500;
            color: #5f6478;
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .register-link-clean i {
            font-size: 0.7rem;
        }

        .register-link-clean:hover {
            color: #0f172a;
            text-decoration: none;
        }

        /* Alert styling lebih minimal */
        .alert-clean {
            border-radius: 16px;
            font-size: 0.8rem;
            padding: 0.7rem 1rem;
            border: none;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-clean i {
            font-size: 0.85rem;
        }

        /* Spacing antar elemen */
        .form-group-spacing {
            margin-bottom: 1.25rem;
        }

        .bottom-section {
            margin-top: 1.5rem;
            text-align: center;
            padding-top: 0.5rem;
            border-top: 1px solid #f0f2f5;
        }

        /* Icon di dalam input (opsional) - tetap clean */
        .input-icon-wrapper {
            position: relative;
        }

        /* Loading state button */
        .btn-spinner-sm {
            width: 1rem;
            height: 1rem;
            border-width: 1.5px;
        }

        button:disabled {
            opacity: 0.75;
            cursor: not-allowed;
        }

        /* Responsive adjustment */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            .login-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <main class="w-100">
        <div class="login-card mx-auto">
            <!-- Header Section - logo lebih kecil dan clean -->
            <div class="text-center mb-3">
                <div class="logo-box mb-2">
                    <i class="fas fa-star"></i>
                </div>
                <h1 class="login-title">Login</h1>
                <p class="login-subtitle">Selamat datang kembali</p>
            </div>

            <!-- Alert Container dengan styling clean -->
            <div id="alertContainer"></div>

            <form id="loginForm">
                <!-- Email Field - label lebih kecil -->
                <div class="form-group-spacing">
                    <label class="form-label-clean">
                        <i class="far fa-envelope me-1" style="font-size: 0.65rem;"></i> Alamat Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-control input-clean" 
                        placeholder="nama@email.com" 
                        autocomplete="email"
                        required>
                </div>

                <!-- Password Field -->
                <div class="form-group-spacing">
                    <label class="form-label-clean">
                        <i class="fas fa-lock me-1" style="font-size: 0.65rem;"></i> Kata Sandi
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-control input-clean" 
                        placeholder="Masukkan password" 
                        autocomplete="current-password"
                        required>
                </div>

                <!-- Tombol Login -->
                <button type="submit" id="btnLogin" class="btn btn-login-clean w-100">
                    <span id="btnText">
                        <i class="fas fa-arrow-right-to-bracket" style="font-size: 0.75rem;"></i>
                        <span>Masuk</span>
                    </span>
                </button>

                <!-- Link Registrasi -->
                <div class="bottom-section">
                    <a href="registrasi.html" class="register-link-clean">
                        <i class="far fa-plus"></i>
                        Belum punya akun? Daftar sekarang
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/helpers.js"></script>
    <script>
        // ============================================================
        // UI/UX LOGIC - SAME FUNCTIONALITY WITH CLEANER UX FEEDBACK
        // ============================================================
        
        document.addEventListener("DOMContentLoaded", initLoginPage);

        function initLoginPage() {
            // Cek apakah user sudah login
            let storedUser = null;
            try {
                storedUser = JSON.parse(localStorage.getItem("user"));
            } catch(e) {}

            if (storedUser && storedUser.token) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById("loginForm").addEventListener("submit", handleLogin);
            
            // UX enhancement: Clear alert when user starts typing in any field
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            
            const clearAlertOnInput = () => {
                const alertContainer = document.getElementById("alertContainer");
                if (alertContainer && alertContainer.innerHTML.trim() !== "") {
                    // gentle fade-out effect
                    const existingAlert = alertContainer.firstChild;
                    if (existingAlert && existingAlert.style) {
                        existingAlert.style.transition = "opacity 0.2s";
                        existingAlert.style.opacity = "0";
                        setTimeout(() => {
                            if (alertContainer.innerHTML.includes(existingAlert.outerHTML)) {
                                alertContainer.innerHTML = "";
                            }
                        }, 200);
                    } else {
                        alertContainer.innerHTML = "";
                    }
                }
            };
            
            if (emailInput) emailInput.addEventListener("input", clearAlertOnInput);
            if (passwordInput) passwordInput.addEventListener("input", clearAlertOnInput);
        }

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            // Basic validation: UX feedback langsung
            if (!email || !password) {
                showAlert("danger", "Email dan kata sandi harus diisi");
                // Shake effect subtle (opsional)
                const card = document.querySelector(".login-card");
                if (card) {
                    card.style.transform = "translateX(4px)";
                    setTimeout(() => { if(card) card.style.transform = ""; }, 100);
                    setTimeout(() => { if(card) card.style.transform = ""; }, 150);
                }
                return;
            }

            const button = document.getElementById("btnLogin");
            const buttonSpan = document.getElementById("btnText");

            try {
                setLoading(button, buttonSpan, true);

                // Panggil API service yang sudah ada (ApiService.login)
                if (typeof ApiService === 'undefined') {
                    throw new Error("Layanan tidak tersedia. Pastikan file api.js sudah dimuat.");
                }
                
                const user = await ApiService.login(email, password);
                
                // Simpan session (menggunakan Session.set dari helpers.js)
                if (typeof Session !== 'undefined' && typeof Session.set === 'function') {
                    Session.set(user);
                } else {
                    // fallback jika Session tidak ada
                    localStorage.setItem("user", JSON.stringify(user));
                    if (user.token) localStorage.setItem("token", user.token);
                }

                // Success alert dengan icon
                showAlert("success", `Selamat datang kembali, ${user.nama || user.name || 'Pengguna'}!`);
                
                // Redirect setelah delay
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);

            } catch (error) {
                console.error("Login error:", error);
                let errorMessage = error.message || "Login gagal. Periksa email dan password Anda.";
                // Friendly error mapping
                if (errorMessage.toLowerCase().includes("network") || errorMessage.includes("fetch")) {
                    errorMessage = "Koneksi bermasalah. Cek koneksi internet Anda.";
                } else if (errorMessage.toLowerCase().includes("401") || errorMessage.includes("unauthorized")) {
                    errorMessage = "Email atau kata sandi salah.";
                }
                showAlert("danger", errorMessage);
                
                // UX: highlight input fields dengan outline merah halus (opsional)
                const emailEl = document.getElementById("email");
                const passEl = document.getElementById("password");
                if (emailEl && passEl) {
                    emailEl.style.borderColor = "#fecaca";
                    passEl.style.borderColor = "#fecaca";
                    setTimeout(() => {
                        if (emailEl) emailEl.style.borderColor = "";
                        if (passEl) passEl.style.borderColor = "";
                    }, 1500);
                }
            } finally {
                setLoading(button, buttonSpan, false);
            }
        }

        function setLoading(button, buttonSpan, isLoading) {
            if (!button || !buttonSpan) return;
            button.disabled = isLoading;
            
            if (isLoading) {
                buttonSpan.innerHTML = '<i class="fas fa-spinner fa-spin" style="font-size: 0.75rem;"></i> <span>Memproses...</span>';
            } else {
                buttonSpan.innerHTML = '<i class="fas fa-arrow-right-to-bracket" style="font-size: 0.75rem;"></i> <span>Masuk</span>';
            }
        }

        function showAlert(type, message) {
            const alertContainer = document.getElementById("alertContainer");
            if (!alertContainer) return;
            
            // Bootstrap icon mapping based on alert type
            let iconHtml = "";
            if (type === "success") {
                iconHtml = '<i class="fas fa-check-circle" style="font-size: 0.85rem;"></i>';
            } else if (type === "danger") {
                iconHtml = '<i class="fas fa-exclamation-triangle" style="font-size: 0.85rem;"></i>';
            } else {
                iconHtml = '<i class="fas fa-info-circle" style="font-size: 0.85rem;"></i>';
            }
            
            // Map bootstrap alert class
            let alertClass = "alert-clean";
            if (type === "success") alertClass += " alert-success bg-success bg-opacity-10 text-success border-0";
            else if (type === "danger") alertClass += " alert-danger bg-danger bg-opacity-10 text-danger border-0";
            else alertClass += " alert-info bg-info bg-opacity-10 text-info border-0";
            
            const alertHtml = `
                <div class="${alertClass}" role="alert" style="display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        ${iconHtml}
                        <span>${escapeHtml(message)}</span>
                    </div>
                    <button type="button" class="btn-close btn-close-sm" style="font-size: 0.6rem;" onclick="this.closest('.alert-clean').remove()" aria-label="Tutup"></button>
                </div>
            `;
            
            alertContainer.innerHTML = alertHtml;
            
            // Auto dismiss after 4 seconds for better UX
            const alertDiv = alertContainer.querySelector(".alert-clean");
            if (alertDiv) {
                setTimeout(() => {
                    if (alertDiv && alertDiv.parentElement) {
                        alertDiv.style.transition = "opacity 0.25s ease";
                        alertDiv.style.opacity = "0";
                        setTimeout(() => {
                            if (alertDiv.parentElement) alertDiv.remove();
                        }, 250);
                    }
                }, 4000);
            }
        }
        
        // Helper untuk menghindari XSS
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Mock/fallback jika ApiService tidak tersedia (agar halaman tetap graceful)
        // TIDAK mengganggu struktur utama, hanya fallback kalau file api.js belum ada
        if (typeof ApiService === 'undefined') {
            console.warn("[UI Fallback] ApiService tidak ditemukan, menggunakan mock untuk tampilan. Pastikan file api.js tersedia untuk produksi.");
            window.ApiService = {
                async login(email, password) {
                    return new Promise((resolve, reject) => {
                        setTimeout(() => {
                            // Demo credentials: demo@reviewproduct.com / demo123
                            if (email === "demo@reviewproduct.com" && password === "demo123") {
                                resolve({
                                    id: 1,
                                    nama: "Pengguna Demo",
                                    email: email,
                                    token: "mock-token-demo-123"
                                });
                            } else {
                                reject(new Error("Email atau kata sandi salah. Gunakan demo@reviewproduct.com / demo123 untuk uji coba."));
                            }
                        }, 800);
                    });
                }
            };
        }
        
        if (typeof Session === 'undefined') {
            window.Session = {
                set(userData) {
                    localStorage.setItem("user", JSON.stringify(userData));
                    if (userData.token) localStorage.setItem("token", userData.token);
                },
                get() {
                    try {
                        return JSON.parse(localStorage.getItem("user"));
                    } catch(e) { return null; }
                },
                clear() {
                    localStorage.removeItem("user");
                    localStorage.removeItem("token");
                }
            };
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
