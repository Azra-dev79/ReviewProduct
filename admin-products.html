<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Manajemen Produk - ReviewProduct</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(145deg, #f1f5f9 0%, #f8fafc 100%); min-height: 100vh; }

    .sidebar {
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      transition: all 0.3s ease;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .sidebar-brand { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-brand h3 { color: white; font-weight: 700; margin: 0; font-size: 1.4rem; }
    .sidebar-brand p { color: #94a3b8; font-size: 0.75rem; margin: 0; }

    .nav-sidebar { padding: 1rem 0; }
    .nav-sidebar .nav-item { margin: 0.25rem 1rem; }
    .nav-sidebar .nav-link {
      color: #cbd5e1;
      border-radius: 14px;
      padding: 0.75rem 1rem;
      transition: all 0.2s;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .nav-sidebar .nav-link i { width: 24px; margin-right: 12px; font-size: 1.1rem; }
    .nav-sidebar .nav-link:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-sidebar .nav-link.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

    .main-content { padding: 1.5rem; }

    .top-bar {
      background: white;
      border-radius: 24px;
      padding: 0.75rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid #f0f2f5;
    }

    .table-container {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid #f0f2f5;
    }

    .table-modern { margin-bottom: 0; }
    .table-modern thead th { background: #f8fafc; padding: 0.9rem 1rem; font-weight: 700; font-size: 0.8rem; color: #1e293b; border-bottom: 1px solid #e2e8f0; }
    .table-modern tbody td { padding: 0.9rem 1rem; vertical-align: middle; color: #334155; font-size: 0.85rem; }

    .badge-status { padding: 0.25rem 0.7rem; border-radius: 40px; font-size: 0.65rem; font-weight: 600; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fef3c7; color: #92400e; }

    .action-btn { width: 30px; height: 30px; padding: 0; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; border: none; background: transparent; }
    .action-btn-edit { color: #2563eb; }
    .action-btn-edit:hover { background: #eef2ff; }
    .action-btn-delete { color: #dc2626; }
    .action-btn-delete:hover { background: #fef2f2; }

    .star-rating { color: #fbbf24; font-size: 0.7rem; letter-spacing: 2px; }
    .empty-state { text-align: center; padding: 3rem; background: #f8fafc; border-radius: 24px; }
    .page-loader { display: flex; justify-content: center; align-items: center; min-height: 400px; }

    /* Filter & pagination styling */
    .filter-bar {
      background: white;
      border-radius: 20px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      border: 1px solid #f0f2f5;
    }
    .search-input-clean {
      border-radius: 40px;
      border: 1.5px solid #e9edf2;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .search-input-clean:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.06);
      outline: none;
    }
    .filter-select-clean {
      border-radius: 40px;
      border: 1.5px solid #e9edf2;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      background-color: white;
      cursor: pointer;
    }
    .pagination-custom {
      gap: 6px;
      margin-top: 1.5rem;
      justify-content: center;
    }
    .pagination-custom .page-link {
      border-radius: 40px !important;
      border: 1px solid #eef2ff;
      padding: 0.5rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
      background: white;
    }
    .pagination-custom .page-item.active .page-link {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }
    .pagination-custom .page-link:hover:not(.active) {
      background: #f1f5f9;
      transform: translateY(-1px);
    }
    .info-text {
      font-size: 0.75rem;
      color: #64748b;
    }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -280px; width: 280px; transition: left 0.3s ease; z-index: 1050; }
      .sidebar.show { left: 0; }
      .main-content { width: 100%; padding: 1rem; }
      .menu-toggle { display: block; }
      .filter-bar .row > div { margin-bottom: 0.75rem; }
    }
    @media (min-width: 769px) { .menu-toggle { display: none; } }
  </style>
</head>

<body>
  <div class="container-fluid p-0">
    <div class="row g-0">
      <div class="col-auto sidebar" id="sidebar">
        <div class="sidebar-brand">
          <h3>⭐ ReviewProduct</h3>
          <p>Admin Dashboard</p>
        </div>
        <div class="nav-sidebar">
          <div class="nav-item"><a href="admin-dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></div>
          <div class="nav-item"><a href="admin-products.html" class="nav-link active"><i class="fas fa-box"></i> Produk</a></div>
          <div class="nav-item"><a href="admin-reviews.html" class="nav-link"><i class="fas fa-star"></i> Ulasan</a></div>
          <div class="nav-item"><a href="admin-upload.html" class="nav-link"><i class="fas fa-plus-circle"></i> Upload Produk</a></div>
          <hr class="my-3" style="border-color: rgba(255,255,255,0.1); margin: 0 1rem;">
          <div class="nav-item mt-3"><div class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
        </div>
      </div>

      <div class="col main-content">
        <div class="top-bar d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-3">
            <button class="btn btn-light menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div><span class="fw-semibold" id="userName">Admin</span><small class="text-muted d-block" id="userRole"></small></div>
          </div>
          <div class="text-muted"><i class="fas fa-calendar-alt me-2"></i><span id="currentDate"></span></div>
        </div>

        <div id="pageContent">
          <div class="page-loader"><div class="text-center"><i class="fas fa-spinner fa-spin fa-2x text-primary mb-3"></i><p class="text-muted">Memuat data produk...</p></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    let currentUser = null;
    let allProducts = [];
    let filteredProducts = [];
    
    // Pagination state
    let currentPage = 1;
    let perPage = 10;
    let totalFiltered = 0;
    
    // Filter state
    let searchKeyword = "";
    let statusFilter = "Semua";
    let kategoriFilter = "Semua";
    let availableCategories = [];

    function escapeHtml(text) { if (!text && text !== 0) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function formatRupiah(amount) { if (!amount && amount !== 0) return '-'; return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount); }
    
    function renderStars(rating) {
      const numRating = Number(rating) || 0;
      const fullStars = Math.floor(numRating);
      const halfStar = numRating % 1 >= 0.5;
      const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
      let stars = '';
      for (let i = 0; i < fullStars; i++) stars += '<i class="fas fa-star"></i>';
      if (halfStar) stars += '<i class="fas fa-star-half-alt"></i>';
      for (let i = 0; i < emptyStars; i++) stars += '<i class="far fa-star"></i>';
      return stars;
    }

    // Apply filters to allProducts
    function applyFilters() {
      filteredProducts = allProducts.filter(product => {
        // Search filter (nama produk, brand, kategori)
        const searchLower = searchKeyword.toLowerCase();
        const matchSearch = searchKeyword === "" || 
          product.nama_produk?.toLowerCase().includes(searchLower) ||
          product.brand?.toLowerCase().includes(searchLower) ||
          product.kategori?.toLowerCase().includes(searchLower);
        
        // Status filter
        const matchStatus = statusFilter === "Semua" || product.status === statusFilter;
        
        // Kategori filter
        const matchKategori = kategoriFilter === "Semua" || product.kategori === kategoriFilter;
        
        return matchSearch && matchStatus && matchKategori;
      });
      
      totalFiltered = filteredProducts.length;
      currentPage = 1; // Reset ke halaman pertama saat filter berubah
    }
    
    // Get paginated products
    function getPaginatedProducts() {
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      return filteredProducts.slice(start, end);
    }
    
    // Extract unique categories from products
    function extractCategories(products) {
      const cats = new Set();
      cats.add("Semua");
      products.forEach(p => {
        if (p.kategori && p.kategori.trim()) {
          cats.add(p.kategori);
        }
      });
      return Array.from(cats);
    }
    
    // Render table with pagination and filters
    function renderProductTable() {
      const contentDiv = document.getElementById('pageContent');
      const paginatedProducts = getPaginatedProducts();
      const totalPages = Math.ceil(totalFiltered / perPage);
      const startItem = totalFiltered === 0 ? 0 : (currentPage - 1) * perPage + 1;
      const endItem = Math.min(currentPage * perPage, totalFiltered);
      
      const html = `
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
          <h3 class="fw-bold m-0"><i class="fas fa-box text-primary me-2"></i>Manajemen Produk</h3>
          <a href="admin-upload.html" class="btn btn-primary rounded-pill px-4"><i class="fas fa-plus me-2"></i>Tambah Produk</a>
        </div>
        
        <!-- Filter Bar -->
        <div class="filter-bar">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label small fw-semibold text-muted mb-1"><i class="fas fa-search me-1"></i>Cari Produk</label>
              <input type="text" id="searchInput" class="form-control search-input-clean" placeholder="Nama, brand, kategori..." value="${escapeHtml(searchKeyword)}">
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold text-muted mb-1"><i class="fas fa-tag me-1"></i>Status</label>
              <select id="statusFilter" class="form-select filter-select-clean">
                <option value="Semua" ${statusFilter === "Semua" ? "selected" : ""}>Semua Status</option>
                <option value="Aktif" ${statusFilter === "Aktif" ? "selected" : ""}>Aktif</option>
                <option value="Tidak Aktif" ${statusFilter === "Tidak Aktif" ? "selected" : ""}>Tidak Aktif</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold text-muted mb-1"><i class="fas fa-folder me-1"></i>Kategori</label>
              <select id="kategoriFilter" class="form-select filter-select-clean">
                ${availableCategories.map(cat => `<option value="${escapeHtml(cat)}" ${kategoriFilter === cat ? "selected" : ""}>${escapeHtml(cat)}</option>`).join('')}
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label small fw-semibold text-muted mb-1"><i class="fas fa-eye me-1"></i>Baris/Halaman</label>
              <select id="perPageSelect" class="form-select filter-select-clean">
                <option value="5" ${perPage === 5 ? "selected" : ""}>5</option>
                <option value="10" ${perPage === 10 ? "selected" : ""}>10</option>
                <option value="25" ${perPage === 25 ? "selected" : ""}>25</option>
                <option value="50" ${perPage === 50 ? "selected" : ""}>50</option>
              </select>
            </div>
          </div>
        </div>
        
        <!-- Info & Table -->
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div class="info-text"><i class="fas fa-database me-1"></i>Menampilkan <strong>${startItem}</strong> - <strong>${endItem}</strong> dari <strong>${totalFiltered}</strong> produk</div>
          <div class="info-text"><i class="fas fa-filter me-1"></i>Filter aktif: ${searchKeyword ? `"${escapeHtml(searchKeyword)}"` : "semua"} ${statusFilter !== "Semua" ? `· status: ${statusFilter}` : ""} ${kategoriFilter !== "Semua" ? `· kategori: ${kategoriFilter}` : ""}</div>
        </div>
        
        <div class="table-container">
          ${paginatedProducts.length > 0 ? `
            <table class="table table-modern">
              <thead>
                <tr><th>Produk</th><th>Kategori</th><th>Harga</th><th>Rating</th><th>Status</th><th>Aksi</th></tr>
              </thead>
              <tbody>
                ${paginatedProducts.map(p => `
                  <tr>
                    <td><div><div class="fw-semibold">${escapeHtml(p.nama_produk)}</div><small class="text-muted">${escapeHtml(p.brand || '-')}</small></div></td>
                    <td>${escapeHtml(p.kategori || '-')}</td>
                    <td class="fw-semibold text-primary">${formatRupiah(p.harga)}</td>
                    <td><div class="star-rating">${renderStars(p.rating_rata_rata || 0)}</div><small>${(p.rating_rata_rata || 0).toFixed(1)}</small></td>
                    <td><span class="badge-status ${p.status === 'Aktif' ? 'badge-active' : 'badge-inactive'}">${escapeHtml(p.status || 'Aktif')}</span></td>
                    <td><a href="admin-upload.html?id=${p.id}" class="action-btn action-btn-edit"><i class="fas fa-edit"></i></a><button onclick="deleteProduct('${p.id}')" class="action-btn action-btn-delete"><i class="fas fa-trash-alt"></i></button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : `
            <div class="empty-state">
              <i class="fas fa-box-open fa-2x text-muted"></i>
              <p class="text-muted mt-2">${searchKeyword || statusFilter !== "Semua" || kategoriFilter !== "Semua" ? 'Tidak ada produk yang sesuai dengan filter' : 'Belum ada produk'}</p>
              ${searchKeyword || statusFilter !== "Semua" || kategoriFilter !== "Semua" ? '<button class="btn btn-sm btn-outline-secondary mt-2" id="resetFiltersBtn"><i class="fas fa-undo me-1"></i>Reset Filter</button>' : ''}
            </div>
          `}
        </div>
        
        ${totalPages > 1 ? `
          <nav class="mt-4">
            <ul class="pagination pagination-custom">
              <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="prev"><i class="fas fa-chevron-left"></i></a>
              </li>
              ${generatePaginationNumbers(currentPage, totalPages).map(item => 
                item === '...' ? 
                  `<li class="page-item disabled"><span class="page-link">...</span></li>` :
                  `<li class="page-item ${item === currentPage ? 'active' : ''}"><a class="page-link" href="#" data-page="${item}">${item}</a></li>`
              ).join('')}
              <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="next"><i class="fas fa-chevron-right"></i></a>
              </li>
            </ul>
          </nav>
        ` : ''}
      `;
      
      contentDiv.innerHTML = html;
      
      // Attach event listeners
      attachFilterEvents();
      attachPaginationEvents(totalPages);
    }
    
    function generatePaginationNumbers(current, total) {
      const delta = 2;
      const range = [];
      const rangeWithDots = [];
      let l;
      
      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || (i >= current - delta && i <= current + delta)) {
          range.push(i);
        }
      }
      
      range.forEach((i) => {
        if (l) {
          if (i - l === 2) {
            rangeWithDots.push(l + 1);
          } else if (i - l !== 1) {
            rangeWithDots.push('...');
          }
        }
        rangeWithDots.push(i);
        l = i;
      });
      
      return rangeWithDots;
    }
    
    function attachFilterEvents() {
      const searchInput = document.getElementById('searchInput');
      const statusSelect = document.getElementById('statusFilter');
      const kategoriSelect = document.getElementById('kategoriFilter');
      const perPageSelect = document.getElementById('perPageSelect');
      const resetBtn = document.getElementById('resetFiltersBtn');
      
      if (searchInput) {
        searchInput.addEventListener('input', debounce(() => {
          searchKeyword = searchInput.value.trim();
          applyFilters();
          renderProductTable();
        }, 400));
      }
      
      if (statusSelect) {
        statusSelect.addEventListener('change', () => {
          statusFilter = statusSelect.value;
          applyFilters();
          renderProductTable();
        });
      }
      
      if (kategoriSelect) {
        kategoriSelect.addEventListener('change', () => {
          kategoriFilter = kategoriSelect.value;
          applyFilters();
          renderProductTable();
        });
      }
      
      if (perPageSelect) {
        perPageSelect.addEventListener('change', () => {
          perPage = parseInt(perPageSelect.value);
          currentPage = 1;
          renderProductTable();
        });
      }
      
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          searchKeyword = "";
          statusFilter = "Semua";
          kategoriFilter = "Semua";
          currentPage = 1;
          applyFilters();
          renderProductTable();
        });
      }
    }
    
    function attachPaginationEvents(totalPages) {
      const pageLinks = document.querySelectorAll('[data-page]');
      pageLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const pageValue = link.getAttribute('data-page');
          let newPage = currentPage;
          
          if (pageValue === 'prev') {
            newPage = Math.max(1, currentPage - 1);
          } else if (pageValue === 'next') {
            newPage = Math.min(totalPages, currentPage + 1);
          } else {
            newPage = parseInt(pageValue);
          }
          
          if (newPage !== currentPage && newPage >= 1 && newPage <= totalPages) {
            currentPage = newPage;
            renderProductTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      });
    }
    
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
    
    async function loadProducts() {
      const contentDiv = document.getElementById('pageContent');
      contentDiv.innerHTML = '<div class="page-loader"><div class="text-center"><i class="fas fa-spinner fa-spin fa-2x text-primary mb-3"></i><p class="text-muted">Memuat data produk...</p></div></div>';
      
      try {
        // Load all products from API (large limit)
        const response = await ApiService.getProduk(1, 5000, "Semua", "", "");
        allProducts = (response && Array.isArray(response.items)) ? response.items : [];
        
        // Extract categories from products
        availableCategories = extractCategories(allProducts);
        
        // Initialize kategoriFilter to first valid option if needed
        if (kategoriFilter !== "Semua" && !availableCategories.includes(kategoriFilter)) {
          kategoriFilter = "Semua";
        }
        
        // Apply filters
        applyFilters();
        
        // Render full UI with filters and pagination
        renderProductTable();
        
      } catch (error) {
        console.error("Error:", error);
        contentDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle fa-2x text-danger"></i><p class="text-danger mt-2">Gagal memuat data produk</p><button class="btn btn-primary mt-2" onclick="location.reload()">Coba Lagi</button></div>`;
      }
    }

    window.deleteProduct = async function(productId) {
      const result = await Swal.fire({ 
        title: 'Hapus Produk?', 
        text: "Produk yang dihapus tidak dapat dikembalikan!", 
        icon: 'warning', 
        showCancelButton: true, 
        confirmButtonColor: '#dc2626', 
        confirmButtonText: 'Ya, Hapus!', 
        cancelButtonText: 'Batal' 
      });
      
      if (result.isConfirmed) {
        try {
          await ApiService.deleteProduk(productId);
          Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Produk berhasil dihapus.' });
          await loadProducts();
        } catch (error) {
          Swal.fire({ icon: 'error', title: 'Gagal!', text: error.message || 'Gagal menghapus produk.' });
        }
      }
    };

    async function init() {
      currentUser = Session.get();
      if (!currentUser) { window.location.href = "login.html"; return; }
      if (currentUser.role !== "admin") { 
        await Swal.fire({ icon: "error", title: "Akses Ditolak", text: "Halaman ini hanya untuk admin" });
        window.location.href = "index.html"; 
        return; 
      }
      
      document.getElementById("userName").innerHTML = escapeHtml(currentUser.nama);
      document.getElementById("userRole").innerHTML = currentUser.role;
      document.getElementById("currentDate").innerHTML = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      
      document.getElementById('logoutBtn').addEventListener('click', () => { 
        Session.remove(); 
        window.location.href = "login.html"; 
      });
      
      document.getElementById('menuToggle').addEventListener('click', () => { 
        document.getElementById('sidebar').classList.toggle('show'); 
      });
      
      await loadProducts();
    }
    
    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
